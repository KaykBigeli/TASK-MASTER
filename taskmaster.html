<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskMaster</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a2f45;--text:#e8eaf0;--muted:#6b7280;--accent:#4f6ef7;--accent2:#7c3aed;--high:#ef4444;--medium:#f59e0b;--low:#3b82f6;--success:#10b981;--sidebar-w:240px;--radius:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:fixed;top:0;left:0;height:100vh;z-index:10;}
.logo{display:flex;align-items:center;gap:10px;padding:0 20px 24px;border-bottom:1px solid var(--border);}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:700;}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.nav-section{padding:16px 12px 8px;}
.nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:0 8px 8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--muted);transition:.15s;user-select:none;margin-bottom:2px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:#4f6ef718;color:var(--accent);font-weight:500;}
.project-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);transition:.15s;margin-bottom:1px;}
.project-item:hover{background:var(--surface2);color:var(--text);}
.project-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sidebar-footer{margin-top:auto;padding:16px 12px 0;border-top:1px solid var(--border);}
.profile-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;}
.profile-card:hover{background:var(--surface2);}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;color:#fff;}
.profile-name{font-size:13px;font-weight:500;}
.profile-email{font-size:11px;color:var(--muted);}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{display:flex;align-items:center;gap:12px;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.search-box{flex:1;max-width:380px;display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13.5px;font-family:inherit;width:100%;}
.search-box input::placeholder{color:var(--muted);}
.btn{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:8px;border:none;font-family:inherit;font-size:13.5px;font-weight:500;cursor:pointer;transition:.15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#3d5ce6;}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-left:auto;}
.progress-label{font-size:12px;color:var(--muted);white-space:nowrap;}
.progress-bar{width:120px;height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));border-radius:99px;transition:.4s;}
.content{flex:1;overflow-y:auto;padding:28px;}
.content::-webkit-scrollbar{width:5px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.section{margin-bottom:32px;}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.section-title{font-size:14px;font-weight:600;}
.section-count{font-size:12px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:99px;}
.section-line{flex:1;height:1px;background:var(--border);}
.task-row{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:.15s;position:relative;overflow:hidden;animation:fadeUp .2s ease both;}
.task-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:.15s;}
.task-row:hover{border-color:#4f6ef744;transform:translateX(2px);}
.task-row:hover::before{background:var(--accent);}
.task-check{width:18px;height:18px;border:2px solid var(--border);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;cursor:pointer;}
.task-check:hover{border-color:var(--success);}
.task-check.done{background:var(--success);border-color:var(--success);color:#fff;font-size:11px;}
.task-title{flex:1;font-size:13.5px;}
.task-title.done{text-decoration:line-through;color:var(--muted);}
.task-date{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;letter-spacing:.3px;}
.badge-high{background:#ef444422;color:var(--high);}
.badge-medium{background:#f59e0b22;color:var(--medium);}
.badge-low{background:#3b82f622;color:var(--low);}
.collab-stack{display:flex;}
.collab-stack .avatar{width:24px;height:24px;font-size:10px;border:2px solid var(--surface);margin-left:-6px;}
.collab-stack .avatar:first-child{margin-left:0;}
.modal-overlay{position:fixed;inset:0;background:#000b;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:.2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:720px;max-width:95vw;max-height:90vh;overflow-y:auto;transform:translateY(16px) scale(.98);transition:.2s;}
.modal-overlay.open .modal{transform:none;}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.modal-header{display:flex;align-items:center;gap:12px;padding:20px 24px 0;}
.modal-back{background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;transition:.15s;padding:0;}
.modal-back:hover{color:var(--text);}
.modal-actions{margin-left:auto;display:flex;gap:8px;}
.icon-btn{width:32px;height:32px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:.15s;}
.icon-btn:hover{border-color:var(--accent);}
.modal-body{padding:20px 24px 28px;}
.modal-title-input{background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:22px;font-weight:600;width:100%;letter-spacing:-.4px;margin-bottom:20px;}
.modal-content-wrap{display:flex;gap:24px;}
.modal-left{flex:1;}
.modal-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.modal-field{display:flex;flex-direction:column;gap:8px;flex:1;min-width:140px;}
.field-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.styled-select{appearance:none;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13.5px;padding:9px 14px;width:100%;cursor:pointer;outline:none;transition:.15s;}
.styled-select:focus{border-color:var(--accent);}
.date-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:9px 14px;outline:none;transition:.15s;width:100%;}
.date-input:focus{border-color:var(--accent);}
.textarea-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:10px 12px;outline:none;resize:none;min-height:72px;transition:.15s;}
.textarea-input:focus{border-color:var(--accent);}
.checklist-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #2a2f4555;}
.checklist-item:last-child{border-bottom:none;}
.check-circle{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;font-size:10px;color:#fff;}
.check-circle:hover{border-color:var(--success);}
.check-circle.done{background:var(--success);border-color:var(--success);}
.check-circle.progress{border-color:var(--medium);background:#f59e0b22;}
.checklist-text{flex:1;font-size:13.5px;}
.checklist-status-badge{font-size:11px;color:var(--muted);}
.add-item-row{display:flex;gap:8px;margin-top:12px;}
.add-item-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:8px 12px;outline:none;transition:.15s;}
.add-item-input:focus{border-color:var(--accent);}
.modal-sidebar{width:210px;flex-shrink:0;}
.auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;transition:.3s;}
.auth-screen.hidden{opacity:0;pointer-events:none;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:380px;}
.auth-tabs{display:flex;background:var(--surface2);border-radius:9px;padding:3px;margin-bottom:24px;}
.auth-tab{flex:1;text-align:center;padding:7px;border-radius:7px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--muted);transition:.15s;}
.auth-tab.active{background:var(--surface);color:var(--text);}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:14px;padding:11px 14px;outline:none;transition:.15s;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #4f6ef715;}
.auth-error{background:#ef444415;border:1px solid #ef444433;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--high);margin-bottom:16px;display:none;}
.auth-error.show{display:block;}
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4;}
.empty-text{font-size:14px;color:var(--muted);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13.5px;z-index:999;transform:translateY(80px);opacity:0;transition:.25s;}
.toast.show{transform:none;opacity:1;}
.toast.success{border-color:#10b98144;}
.toast.error{border-color:#ef444444;}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.filters-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:12.5px;cursor:pointer;transition:.15s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:#4f6ef710;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="logo" style="margin-bottom:28px;padding:0;">
      <div class="logo-icon">✓</div>
      <span class="logo-text" style="font-size:18px">TaskMaster</span>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Entrar</div>
      <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Criar conta</div>
    </div>
    <div id="authError" class="auth-error"></div>
    <div id="loginForm">
      <div class="form-group"><label class="form-label">E-mail</label><input class="form-input" type="email" id="loginEmail" placeholder="seu@email.com"></div>
      <div class="form-group"><label class="form-label">Senha</label><input class="form-input" type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="doLogin()">Entrar</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="form-group"><label class="form-label">Nome</label><input class="form-input" type="text" id="regName" placeholder="Seu nome"></div>
      <div class="form-group"><label class="form-label">E-mail</label><input class="form-input" type="email" id="regEmail" placeholder="seu@email.com"></div>
      <div class="form-group"><label class="form-label">Senha</label><input class="form-input" type="password" id="regPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="doRegister()">Criar conta</button>
    </div>
  </div>
</div>

<nav class="sidebar">
  <div class="logo"><div class="logo-icon">✓</div><span class="logo-text">TaskMaster</span></div>
  <div class="nav-section">
    <div class="nav-label">Menu</div>
    <div class="nav-item active" id="nav-dashboard" onclick="setView('dashboard',this)"><span>⊞</span> Dashboard</div>
    <div class="nav-item" id="nav-my-tasks" onclick="setView('my-tasks',this)"><span>☑</span> Minhas Tasks</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Projetos</div>
    <div id="projectList"></div>
    <div class="nav-item" onclick="promptNewProject()"><span>+</span> Novo projeto</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Filtros</div>
    <div class="nav-item" onclick="setFilter('high')"><span>🔴</span> Alta prioridade</div>
    <div class="nav-item" onclick="setFilter('medium')"><span>🟡</span> Média prioridade</div>
    <div class="nav-item" onclick="setFilter('low')"><span>🔵</span> Baixa prioridade</div>
    <div class="nav-item" onclick="setFilter(null)"><span>⚪</span> Todas</div>
  </div>
  <div class="sidebar-footer">
    <div class="profile-card" onclick="logout()">
      <div class="avatar" id="sidebarAvatar">?</div>
      <div style="flex:1">
        <div class="profile-name" id="sidebarName">Usuário</div>
        <div class="profile-email" id="sidebarEmail"></div>
      </div>
      <span style="color:var(--muted);font-size:12px">Sair</span>
    </div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="search-box">
      <span style="color:var(--muted)">🔍</span>
      <input type="text" placeholder="Buscar tarefas..." id="searchInput" oninput="renderTasks()">
    </div>
    <button class="btn btn-primary" onclick="openNewTask()">+ Nova Task</button>
    <div class="progress-wrap">
      <span class="progress-label" id="progressLabel">0 / 0 concluídas</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="content" id="mainContent"><div class="loading"><div class="spinner"></div></div></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal" id="taskModal">
    <div class="modal-header">
      <button class="modal-back" onclick="closeModal()">← Tasks</button>
      <div class="modal-actions">
        <div class="icon-btn" id="saveBtn" onclick="handleSave()" title="Salvar">💾</div>
        <div class="icon-btn" onclick="deleteCurrentTask()" title="Deletar">🗑</div>
        <div class="icon-btn" onclick="closeModal()" title="Fechar">✕</div>
      </div>
    </div>
    <div class="modal-body">
      <input class="modal-title-input" id="modalTitle" placeholder="Título da task">
      <div class="modal-content-wrap">
        <div class="modal-left">
          <div class="modal-row">
            <div class="modal-field">
              <div class="field-label">Status</div>
              <select class="styled-select" id="modalStatus">
                <option value="todo">A fazer</option>
                <option value="in_progress">Em andamento</option>
                <option value="completed">Concluída ✓</option>
              </select>
            </div>
            <div class="modal-field">
              <div class="field-label">Prioridade</div>
              <select class="styled-select" id="modalPriority">
                <option value="high">🔴 Alta</option>
                <option value="medium">🟡 Média</option>
                <option value="low">🔵 Baixa</option>
              </select>
            </div>
            <div class="modal-field">
              <div class="field-label">Prazo</div>
              <input type="date" class="date-input" id="modalDueDate">
            </div>
          </div>
          <div class="modal-field" style="margin-bottom:20px">
            <div class="field-label">Descrição</div>
            <textarea class="textarea-input" id="modalDescription" placeholder="Adicione uma descrição..."></textarea>
          </div>
          <div>
            <div class="field-label" style="margin-bottom:12px">Checklist</div>
            <div id="modalChecklist"></div>
            <div class="add-item-row">
              <input class="add-item-input" id="newCheckItem" placeholder="Adicionar item..." onkeydown="if(event.key==='Enter')addCheckItem()">
              <button class="btn btn-primary" style="padding:8px 14px" onclick="addCheckItem()">+</button>
            </div>
          </div>
        </div>
        <div class="modal-sidebar">
          <div class="modal-field" style="margin-bottom:16px">
            <div class="field-label">Projeto</div>
            <select class="styled-select" id="modalProject"><option value="">Nenhum</option></select>
          </div>
          <div class="modal-field" style="margin-bottom:16px">
            <div class="field-label">Responsáveis</div>
            <div id="modalAssignees" style="display:flex;flex-wrap:wrap;gap:6px;min-height:24px"></div>
          </div>
          <div class="modal-field">
            <div class="field-label">Comentário</div>
            <textarea class="textarea-input" id="modalComment" placeholder="Escreva um comentário..." style="min-height:80px"></textarea>
            <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="postComment()">Postar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='http://127.0.0.1:8000';
let token=localStorage.getItem('tm_token')||'';
let currentUser=JSON.parse(localStorage.getItem('tm_user')||'null');
let allTasks={today:[],this_week:[],later:[]};
let projects=[];
let currentTask=null;
let activeFilter=null;
let isNewTask=false;

function switchTab(t){
  document.getElementById('tabLogin').classList.toggle('active',t==='login');
  document.getElementById('tabRegister').classList.toggle('active',t==='register');
  document.getElementById('loginForm').style.display=t==='login'?'':'none';
  document.getElementById('registerForm').style.display=t==='register'?'':'none';
  document.getElementById('authError').classList.remove('show');
}

async function doLogin(){
  const email=document.getElementById('loginEmail').value;
  const pass=document.getElementById('loginPassword').value;
  if(!email||!pass)return showAuthError('Preencha todos os campos.');
  try{
    const form=new URLSearchParams({username:email,password:pass});
    const res=await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:form});
    const data=await res.json();
    if(!res.ok)return showAuthError(data.detail||'Erro ao entrar.');
    token=data.access_token;
    localStorage.setItem('tm_token',token);
    currentUser={email};
    localStorage.setItem('tm_user',JSON.stringify(currentUser));
    initApp();
  }catch(e){showAuthError('Não foi possível conectar à API ('+e.message+')');}
}

async function doRegister(){
  const name=document.getElementById('regName').value;
  const email=document.getElementById('regEmail').value;
  const pass=document.getElementById('regPassword').value;
  if(!name||!email||!pass)return showAuthError('Preencha todos os campos.');
  try{
    const res=await fetch(`${API}/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pass})});
    const data=await res.json();
    if(!res.ok)return showAuthError(data.detail||'Erro ao criar conta.');
    showToast('Conta criada! Faça login.','success');
    switchTab('login');
    document.getElementById('loginEmail').value=email;
  }catch(e){showAuthError('Não foi possível conectar à API.');}
}

function showAuthError(msg){const el=document.getElementById('authError');el.textContent=msg;el.classList.add('show');}

function logout(){
  localStorage.removeItem('tm_token');localStorage.removeItem('tm_user');
  token='';currentUser=null;
  document.getElementById('authScreen').classList.remove('hidden');
}

async function initApp(){
  document.getElementById('authScreen').classList.add('hidden');
  if(currentUser){
    const n=currentUser.name||currentUser.email||'Usuário';
    document.getElementById('sidebarName').textContent=n;
    document.getElementById('sidebarEmail').textContent=currentUser.email||'';
    document.getElementById('sidebarAvatar').textContent=n[0].toUpperCase();
  }
  await Promise.all([loadTasks(),loadProjects()]);
}

async function api(path,opts={}){
  try{
    const res=await fetch(`${API}${path}`,{...opts,headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json',...(opts.headers||{})}});
    if(res.status===401){logout();return null;}
    if(res.status===204)return {};
    return res.json();
  }catch(e){showToast('Erro de conexão','error');return null;}
}

async function loadTasks(){
  const data=await api('/tasks/');
  if(!data)return;
  allTasks=data;
  renderTasks();
}

async function loadProjects(){
  const data=await api('/projects/');
  if(!data)return;
  projects=data;
  const colors=['#4f6ef7','#7c3aed','#10b981','#f59e0b','#ef4444'];
  document.getElementById('projectList').innerHTML=projects.map((p,i)=>`<div class="project-item" onclick="loadTasks()"><div class="project-dot" style="background:${colors[i%colors.length]}"></div>${esc(p.name)}</div>`).join('');
  const sel=document.getElementById('modalProject');
  sel.innerHTML='<option value="">Nenhum</option>'+projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
}

function renderTasks(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const sections=[['today','Hoje'],['this_week','Esta Semana'],['later','Mais Tarde']];
  let total=0,done=0,html='';

  html+='<div class="filters-bar">';
  [['','Todas'],[`high`,'🔴 Alta'],[`medium`,'🟡 Média'],[`low`,'🔵 Baixa']].forEach(([v,l])=>{
    html+=`<button class="filter-btn ${activeFilter===v||(!activeFilter&&!v)?'active':''}" onclick="setFilter(${v?`'${v}'`:null})">${l}</button>`;
  });
  html+='</div>';

  sections.forEach(([key,label])=>{
    let tasks=(allTasks[key]||[]).filter(t=>{
      if(activeFilter&&t.priority!==activeFilter)return false;
      if(q&&!t.title.toLowerCase().includes(q))return false;
      return true;
    });
    total+=tasks.length;done+=tasks.filter(t=>t.status==='completed').length;
    if(!tasks.length)return;
    html+=`<div class="section"><div class="section-header"><span class="section-title">${label}</span><span class="section-count">${tasks.length} task${tasks.length!==1?'s':''}</span><div class="section-line"></div></div>`;
    tasks.forEach((t,i)=>{
      const isDone=t.status==='completed';
      const date=t.due_date?fmtDate(t.due_date):'';
      const avatarColors=['#4f6ef7','#7c3aed','#10b981','#f59e0b','#ef4444','#06b6d4'];
      const initials='KPMARSGBT';
      const ac=Math.min(2,Math.floor(Math.random()*3)+1);
      const avs=Array(ac).fill(0).map((_,j)=>`<div class="avatar" style="width:24px;height:24px;font-size:10px;border:2px solid var(--surface);margin-left:${j?'-6px':'0'};background:${avatarColors[(i+j)%avatarColors.length]}">${initials[(i*2+j)%initials.length]}</div>`).join('');
      html+=`<div class="task-row" style="animation-delay:${i*25}ms" onclick="openTask('${t.id}')"><div class="task-check ${isDone?'done':''}" onclick="toggleTask(event,'${t.id}','${t.status}')">${isDone?'✓':''}</div><span class="task-title ${isDone?'done':''}">${esc(t.title)}</span><span class="task-date">${date}</span><span class="badge badge-${t.priority}">${t.priority==='high'?'Alta':t.priority==='medium'?'Média':'Baixa'}</span><div class="collab-stack">${avs}</div></div>`;
    });
    html+='</div>';
  });

  if(total===0)html+=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Nenhuma task encontrada.<br>Clique em "+ Nova Task" para começar.</div></div>`;
  document.getElementById('mainContent').innerHTML=html;
  document.getElementById('progressLabel').textContent=`${done} / ${total} concluídas`;
  document.getElementById('progressFill').style.width=total?`${(done/total)*100}%`:'0%';
}

async function toggleTask(e,id,status){
  e.stopPropagation();
  await api(`/tasks/${id}`,{method:'PATCH',body:JSON.stringify({status:status==='completed'?'todo':'completed'})});
  loadTasks();
}

async function openTask(id){
  isNewTask=false;
  const task=await api(`/tasks/${id}`);
  if(!task)return;
  currentTask=task;
  fillModal(task);
  document.getElementById('modalOverlay').classList.add('open');
}

function fillModal(task){
  document.getElementById('modalTitle').value=task.title||'';
  document.getElementById('modalStatus').value=task.status||'todo';
  document.getElementById('modalPriority').value=task.priority||'medium';
  document.getElementById('modalDueDate').value=task.due_date||'';
  document.getElementById('modalDescription').value=task.description||'';
  document.getElementById('modalProject').value=task.project_id||'';
  renderChecklist(task.checklist||[]);
  renderAssignees(task.assignees||[]);
}

function renderChecklist(items){
  const labels={todo:'A fazer',in_progress:'Em andamento',completed:'Concluído'};
  document.getElementById('modalChecklist').innerHTML=items.length?items.map((item,i)=>`<div class="checklist-item"><div class="check-circle ${item.status==='completed'?'done':item.status==='in_progress'?'progress':''}" onclick="toggleCheckItem('${item.id}','${item.status}')">${item.status==='completed'?'✓':''}</div><span class="checklist-text">${i+1}. ${esc(item.title)}</span><span class="checklist-status-badge">${labels[item.status]||''}</span></div>`).join(''):'<div style="color:var(--muted);font-size:13px;padding:8px 0">Nenhum item ainda.</div>';
}

function renderAssignees(assignees){
  document.getElementById('modalAssignees').innerHTML=assignees.length?assignees.map(a=>`<div style="display:flex;align-items:center;gap:5px;background:var(--surface2);border-radius:99px;padding:3px 10px 3px 3px;"><div class="avatar" style="width:20px;height:20px;font-size:9px">${(a.name||'?')[0].toUpperCase()}</div><span style="font-size:12px">${esc(a.name||'')}</span></div>`).join(''):'<span style="font-size:12px;color:var(--muted)">Nenhum</span>';
}

async function toggleCheckItem(id,status){
  const next=status==='completed'?'todo':status==='todo'?'in_progress':'completed';
  await api(`/tasks/${currentTask.id}/checklist/${id}`,{method:'PATCH',body:JSON.stringify({status:next})});
  const updated=await api(`/tasks/${currentTask.id}`);
  if(updated){currentTask=updated;renderChecklist(updated.checklist||[]);}
}

async function addCheckItem(){
  const input=document.getElementById('newCheckItem');
  const title=input.value.trim();
  if(!title||!currentTask)return;
  await api(`/tasks/${currentTask.id}/checklist`,{method:'POST',body:JSON.stringify({title,position:(currentTask.checklist||[]).length})});
  input.value='';
  const updated=await api(`/tasks/${currentTask.id}`);
  if(updated){currentTask=updated;renderChecklist(updated.checklist||[]);}
}

function openNewTask(){
  isNewTask=true;currentTask=null;
  document.getElementById('modalTitle').value='';
  document.getElementById('modalStatus').value='todo';
  document.getElementById('modalPriority').value='medium';
  document.getElementById('modalDueDate').value='';
  document.getElementById('modalDescription').value='';
  document.getElementById('modalProject').value='';
  document.getElementById('modalChecklist').innerHTML='';
  document.getElementById('modalAssignees').innerHTML='';
  document.getElementById('modalComment').value='';
  document.getElementById('modalOverlay').classList.add('open');
}

async function handleSave(){
  if(isNewTask)await createNewTask();
  else await saveTask();
}

async function saveTask(){
  if(!currentTask)return;
  const body={title:document.getElementById('modalTitle').value,status:document.getElementById('modalStatus').value,priority:document.getElementById('modalPriority').value,due_date:document.getElementById('modalDueDate').value||null,description:document.getElementById('modalDescription').value||null,project_id:document.getElementById('modalProject').value||null};
  await api(`/tasks/${currentTask.id}`,{method:'PATCH',body:JSON.stringify(body)});
  showToast('Task salva!','success');
  loadTasks();
}

async function createNewTask(){
  const title=document.getElementById('modalTitle').value;
  if(!title)return showToast('Digite um título.','error');
  const body={title,status:document.getElementById('modalStatus').value,priority:document.getElementById('modalPriority').value,due_date:document.getElementById('modalDueDate').value||null,description:document.getElementById('modalDescription').value||null,project_id:document.getElementById('modalProject').value||null};
  const task=await api('/tasks/',{method:'POST',body:JSON.stringify(body)});
  if(task){currentTask=task;isNewTask=false;showToast('Task criada!','success');loadTasks();}
}

async function deleteCurrentTask(){
  if(!currentTask)return;
  if(!confirm('Deletar esta task?'))return;
  await api(`/tasks/${currentTask.id}`,{method:'DELETE'});
  closeModal();showToast('Task removida.','success');loadTasks();
}

async function postComment(){
  const content=document.getElementById('modalComment').value.trim();
  if(!content)return;
  showToast('Comentário registrado!','success');
  document.getElementById('modalComment').value='';
}

async function promptNewProject(){
  const name=prompt('Nome do novo projeto:');
  if(!name)return;
  await api('/projects/',{method:'POST',body:JSON.stringify({name})});
  await loadProjects();showToast('Projeto criado!','success');
}

function setFilter(p){activeFilter=p;renderTasks();}
function setView(v,el){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));if(el)el.classList.add('active');renderTasks();}
function overlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');loadTasks();}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');const months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];return`${parseInt(day)} ${months[parseInt(m)-1]}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}

token?initApp():null;
</script>
</body>
</html>
